apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: quest-mode
  labels:
    app.kubernetes.io/name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
    spec:
      initContainers:
        # BusyBox from Docker Hub: pulls reliably in Minikube; Chainguard wait-for-it often hits ErrImagePull if cgr.dev is unreachable or rate-limited.
        - name: wait-for-postgres
          image: docker.io/library/busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              i=1
              while [ "$i" -le 30 ]; do
                if nc -z postgres 5432 2>/dev/null; then exit 0; fi
                i=$((i+1))
                sleep 1
              done
              echo "timeout waiting for postgres:5432" >&2
              exit 1
        - name: wait-for-redis
          image: docker.io/library/busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              i=1
              while [ "$i" -le 30 ]; do
                if nc -z redis 6379 2>/dev/null; then exit 0; fi
                i=$((i+1))
                sleep 1
              done
              echo "timeout waiting for redis:6379" >&2
              exit 1
      containers:
        - name: backend
          image: quest-mode/backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          envFrom:
            - secretRef:
                name: quest-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
