apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: quest-follow-up
  namespace: quest-mode
  labels:
    app.kubernetes.io/name: quest-tekton-tasks
spec:
  description: Reads the hello file from the shared workspace.
  workspaces:
    - name: source
      description: Shared workspace for pipeline steps
  steps:
    - name: show
      image: alpine:3.20
      script: |
        #!/bin/sh
        set -eu
        cat "$(workspaces.source.path)/hello.txt"
