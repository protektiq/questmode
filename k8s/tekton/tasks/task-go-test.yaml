apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: go-test
  namespace: quest-mode
  labels:
    app: quest-mode-ci
spec:
  workspaces:
    - name: source
  steps:
    - name: test
      image: cgr.dev/chainguard/go:latest
      workingDir: /workspace/source/backend
      script: |
        #!/bin/sh
        set -eu
        go test ./...
