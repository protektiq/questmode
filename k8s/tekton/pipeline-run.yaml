apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: quest-mode-ci-run-
  namespace: quest-mode
  labels:
    app: quest-mode-ci
spec:
  pipelineRef:
    name: quest-mode-ci
  params:
    - name: repo-url
      value: https://github.com/protektiq/questmode.git
    - name: revision
      value: main
  workspaces:
    - name: source
      persistentVolumeClaim:
        claimName: tekton-source-pvc
